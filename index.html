<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teachable Machine · Visão IA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #080c14;
      --surface: #0e1420;
      --surface2: #141b28;
      --border: #1e2a3a;
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --text: #e2eaf5;
      --muted: #4a5a72;
      --success: #00ff9d;
      --font-mono: 'Space Mono', monospace;
      --font-body: 'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0,229,255,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(124,58,237,0.06) 0%, transparent 70%);
    }

    .card-shell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      width: 100%;
      max-width: 500px;
      position: relative;
      overflow: hidden;
    }

    .card-shell::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
    }

    /* Header */
    .header-tag {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(0,229,255,0.07);
      border: 1px solid rgba(0,229,255,0.15);
      border-radius: 4px;
      padding: 3px 10px;
      display: inline-block;
      margin-bottom: 0.75rem;
    }

    .header-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 0.3rem;
    }

    .header-sub {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    /* Webcam box */
    .cam-box {
      background: #060a10;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      aspect-ratio: 1 / 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 1.25rem;
    }

    .cam-box canvas {
      width: 100% !important;
      height: auto !important;
      display: block;
      border-radius: 14px;
    }

    .cam-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: var(--muted);
    }

    .cam-icon {
      width: 64px;
      height: 64px;
      border: 1.5px solid rgba(0,229,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,229,255,0.04);
    }

    .cam-icon svg {
      width: 26px;
      height: 26px;
      stroke: rgba(0,229,255,0.4);
    }

    .cam-placeholder span {
      font-size: 0.78rem;
      letter-spacing: 0.5px;
    }

    /* Scanning overlay */
    .scan-line {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scanMove 2s linear infinite;
    }

    @keyframes scanMove {
      0% { top: 0; }
      100% { top: 100%; }
    }

    .scan-line.active { display: block; }

    /* Camera button */
    .btn-cam {
      width: 100%;
      padding: 0.85rem 1rem;
      border: none;
      border-radius: 12px;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform 0.15s, opacity 0.15s;
      background: linear-gradient(135deg, #00b4cc 0%, #0070ff 50%, var(--accent2) 100%);
      color: #fff;
      letter-spacing: 0.3px;
      margin-bottom: 1.25rem;
    }

    .btn-cam:hover:not(:disabled) { opacity: 0.92; transform: translateY(-1px); }
    .btn-cam:active:not(:disabled) { transform: scale(0.98); }
    .btn-cam:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-cam .btn-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .btn-cam::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s;
    }

    .btn-cam:hover:not(:disabled)::after { left: 150%; }

    /* Permission hint */
    .permission-hint {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,229,255,0.04);
      border: 1px solid rgba(0,229,255,0.1);
      border-radius: 10px;
      padding: 0.65rem 1rem;
      margin-bottom: 1.25rem;
      font-size: 0.78rem;
      color: rgba(0,229,255,0.7);
    }

    .permission-hint svg {
      width: 14px;
      height: 14px;
      stroke: var(--accent);
      flex-shrink: 0;
    }

    /* Labels / Progress */
    #label-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .label-row {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.7rem 1rem;
      transition: border-color 0.3s;
    }

    .label-row.leading {
      border-color: rgba(0,229,255,0.35);
    }

    .label-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .label-name {
      font-size: 0.82rem;
      font-family: var(--font-mono);
      color: #a0b4cc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 70%;
    }

    .label-pct {
      font-size: 0.82rem;
      font-family: var(--font-mono);
      font-weight: 700;
      color: var(--accent);
    }

    .label-row.leading .label-name { color: var(--accent); }

    .progress-track {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 20px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 20px;
      background: linear-gradient(90deg, #00b4cc, var(--accent));
      transition: width 0.25s ease;
      width: 0%;
    }

    .label-row.leading .progress-fill {
      background: linear-gradient(90deg, var(--accent), #00ff9d);
    }

    /* Status bar */
    .status-bar {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 1.25rem;
      font-size: 0.75rem;
      color: var(--muted);
      font-family: var(--font-mono);
    }

    .status-bar.active { display: flex; }

    .pulse-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 1.5s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    /* Loading spinner in button */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .spinner.active { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 480px) {
      .card-shell { padding: 1.25rem; }
      .header-title { font-size: 1.25rem; }
    }
  </style>
</head>
<body>

<div class="card-shell">
  <div class="header-tag">IA · Visão Computacional</div>
  <h1 class="header-title">Reconhecimento<br/>de Imagem</h1>
  <p class="header-sub">Classificação em tempo real via câmera — Teachable Machine</p>

  <!-- Webcam -->
  <div class="cam-box" id="cam-box">
    <div class="cam-placeholder" id="cam-placeholder">
      <div class="cam-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
      <span>Câmera inativa</span>
    </div>
    <div id="webcam-container" style="width:100%; display:none; position:relative;"></div>
    <div class="scan-line" id="scan-line"></div>
  </div>

  <!-- Permission hint -->
  <div class="permission-hint" id="perm-hint">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    Ao clicar em iniciar, o navegador solicitará permissão para acessar sua câmera.
  </div>

  <!-- Button -->
  <button class="btn-cam" id="btn-init" onclick="init()">
    <div class="spinner" id="btn-spinner"></div>
    <svg class="btn-icon" id="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 7l-7 5 7 5V7z"/>
      <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
    </svg>
    <span id="btn-label">Iniciar Câmera</span>
  </button>

  <!-- Labels -->
  <div id="label-container"></div>

  <!-- Status -->
  <div class="status-bar" id="status-bar">
    <div class="pulse-dot"></div>
    <span>modelo ativo &nbsp;·&nbsp; analisando em tempo real</span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script>
  const URL = "https://teachablemachine.withgoogle.com/models/6CzG3UMaV/";
  let model, webcam, labelContainer, maxPredictions;

  async function init() {
    const btn = document.getElementById('btn-init');
    const spinner = document.getElementById('btn-spinner');
    const btnIcon = document.getElementById('btn-icon');
    const btnLabel = document.getElementById('btn-label');

    btn.disabled = true;
    spinner.classList.add('active');
    btnIcon.style.display = 'none';
    btnLabel.textContent = 'Carregando modelo...';

    try {
      model = await tmImage.load(URL + "model.json", URL + "metadata.json");
      maxPredictions = model.getTotalClasses();

      btnLabel.textContent = 'Acessando câmera...';

      webcam = new tmImage.Webcam(400, 400, true);
      await webcam.setup();
      await webcam.play();
      window.requestAnimationFrame(loop);

      document.getElementById('cam-placeholder').style.display = 'none';
      document.getElementById('perm-hint').style.display = 'none';
      const wc = document.getElementById('webcam-container');
      wc.style.display = 'block';
      wc.appendChild(webcam.canvas);
      document.getElementById('scan-line').classList.add('active');

      labelContainer = document.getElementById("label-container");
      labelContainer.innerHTML = '';

      for (let i = 0; i < maxPredictions; i++) {
        const row = document.createElement('div');
        row.className = 'label-row';
        row.id = 'row-' + i;
        row.innerHTML = `
          <div class="label-header">
            <span class="label-name" id="name-${i}">Classe ${i + 1}</span>
            <span class="label-pct" id="pct-${i}">0%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="bar-${i}"></div>
          </div>`;
        labelContainer.appendChild(row);
      }

      spinner.classList.remove('active');
      btnIcon.style.display = 'block';
      btnLabel.textContent = 'Em execução';
      document.getElementById('status-bar').classList.add('active');

    } catch (err) {
      btn.disabled = false;
      spinner.classList.remove('active');
      btnIcon.style.display = 'block';
      btnLabel.textContent = 'Tentar novamente';
      console.error(err);
    }
  }

  async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
  }

  async function predict() {
    const prediction = await model.predict(webcam.canvas);
    let maxIdx = 0;
    for (let i = 1; i < prediction.length; i++) {
      if (prediction[i].probability > prediction[maxIdx].probability) maxIdx = i;
    }
    for (let i = 0; i < maxPredictions; i++) {
      const pct = (prediction[i].probability * 100).toFixed(1);
      document.getElementById(`name-${i}`).textContent = prediction[i].className;
      document.getElementById(`pct-${i}`).textContent = pct + '%';
      document.getElementById(`bar-${i}`).style.width = pct + '%';
      const row = document.getElementById(`row-${i}`);
      if (i === maxIdx) row.classList.add('leading');
      else row.classList.remove('leading');
    }
  }
</script>
</body>
</html>
